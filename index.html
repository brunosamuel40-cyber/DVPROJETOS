<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DV Projetos — Engenharia Térmica & Mecânica</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --navy:#0D2D4E;
  --amber:#C47A0A;
  --white:#FAFAFA;
}

*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--white)}

nav{
  position:fixed;top:0;left:0;right:0;
  height:68px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 40px;
  background:rgba(13,45,78,.97);
}

/* LOGO NORMAL */
.nav-logo{
  display:flex;
  align-items:center;
}

/* 🔥 GLOW PROFISSIONAL */
.logo-glow{
  position:relative;
  display:inline-block;
}

.logo-glow::before{
  content:"";
  position:absolute;
  inset:-18px;
  background:radial-gradient(circle,
    rgba(255,255,255,0.45) 0%,
    rgba(255,255,255,0.25) 40%,
    transparent 70%);
  filter:blur(18px);
  z-index:0;
}

.logo-glow img{
  position:relative;
  height:46px;
  z-index:1;
}

.nav-links{
  display:flex;
  gap:30px;
  list-style:none;
}

.nav-links a{
  color:rgba(255,255,255,.7);
  text-transform:uppercase;
  font-size:12px;
}

.nav-cta{
  background:var(--amber);
  color:white;
  padding:10px 20px;
  border:none;
  cursor:pointer;
}

/* HERO SIMPLES (mantive só base pra não quebrar layout) */
.hero{
  height:100vh;
  background:var(--navy);
}
</style>
</head>

<body>

<!-- NAV -->
<nav id="mainNav">

  <!-- LOGO NOVA COM GLOW -->
  <div class="nav-logo">
    <div class="logo-glow">
      <img src="logo fundo transparente canva.svg" alt="DV Projetos">
    </div>
  </div>

  <ul class="nav-links">
    <li><a href="#">Serviços</a></li>
    <li><a href="#">Projetos</a></li>
    <li><a href="#">Processo</a></li>
    <li><a href="#">Escopo</a></li>
    <li><a href="#">Sobre</a></li>
    <li><a href="#">Contato</a></li>
  </ul>

  <button class="nav-cta">Solicitar Análise</button>

</nav>

<section class="hero"></section>

</body>
</html>
